<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글 읽기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="brand">내 블로그</a>
  <div class="links">
    <a href="index.html">홈</a>
    <a href="about.html">About</a>
  </div>
</nav>

<div class="container">
  <a href="index.html" class="back">← 목록으로</a>
  <div class="post-content" id="post-content">로딩 중...</div>
</div>

<footer>© 2026 내 블로그</footer>

<script>
  function parseFrontmatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return { meta: {}, body: text };
    const meta = {};
    match[1].split('\n').forEach(line => {
      const [k, ...v] = line.split(':');
      if (k) meta[k.trim()] = v.join(':').trim();
    });
    return { meta, body: match[2] };
  }

  async function loadPost() {
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { location.href = 'index.html'; return; }

    const res = await fetch('Obsidian/Wiki/' + slug + '.md');
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);

    document.title = (meta.title || '글') + ' | 내 블로그';

    document.getElementById('post-content').innerHTML = `
      <h1>${meta.title || ''}</h1>
      <div class="post-meta">${meta.date || ''}</div>
      <div class="post-body">${marked.parse(body)}</div>
    `;
  }

  loadPost();
</script>
</body>
</html>
