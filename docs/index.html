<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지식 블로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="brand">지식 블로그</a>
  <div class="links">
    <a href="index.html">홈</a>
    <a href="about.html">About</a>
  </div>
</nav>

<div class="hero">
  <h1>지식 블로그</h1>
  <p>궁금증을 가진 사람들에게 솔루션을 — 옵시디언으로 정리한 지식을 공유합니다.</p>
</div>

<div class="container">
  <div class="post-grid" id="post-grid">로딩 중...</div>
</div>

<footer>© 2026 지식 블로그</footer>

<script>
  async function loadPosts() {
    const grid = document.getElementById('post-grid');
    grid.innerHTML = '';

    const res   = await fetch('posts.json');
    const posts = await res.json();

    for (const p of posts) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = 'posts/' + p.slug + '.html';
      card.innerHTML = `
        <div class="card-date">${p.date}</div>
        <h2>${p.title}</h2>
        <p>${p.excerpt.slice(0, 80)}${p.excerpt.length > 80 ? '...' : ''}</p>
      `;
      grid.appendChild(card);
    }
  }

  loadPosts();
</script>
</body>
</html>
